<!-- @startingPoint section="Portfolio" subtitle="Centered one-at-a-time photo gallery" viewport="900x620" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>photography — Baha Satgun</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--ink-0);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: var(--font-mono);
  }
  /* top bar */
  .bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--space-4) var(--space-6);
  }
  .back {
    display: inline-flex; align-items: center; gap: var(--space-2);
    color: var(--muted-1); text-decoration: none; font-weight: 300;
    font-size: var(--size-xs); letter-spacing: 0.04em;
    transition: color var(--dur-normal) ease;
  }
  .back:hover { color: var(--accent-red); }
  .eyebrow {
    font-size: var(--size-2xs); letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent-red); font-weight: 300;
  }
  /* stage */
  .stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    gap: var(--space-4);
    padding: 0 var(--space-4) var(--space-5);
  }
  .frame-wrap { display: flex; flex-direction: column; align-items: center; gap: var(--space-3); }
  .frame {
    position: relative;
    width: min(88vw, 1120px);
    aspect-ratio: 3 / 2;
    overflow: hidden;
  }
  .frame .img { position: absolute; inset: 0; animation: fadein var(--dur-slow) var(--ease-out); }
  @keyframes fadein { from { opacity: 0; transform: scale(1.015); } to { opacity: 1; transform: none; } }
  .meta-br { position: absolute; bottom: 14px; right: 18px; font-size: 10px; color: var(--muted-1); letter-spacing: 0.06em; }
  .caption { font-family: var(--font-serif); font-size: var(--size-sm); color: var(--muted-1); text-align: center; }
  /* arrows */
  .arrow {
    width: 46px; height: 46px; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 0; color: var(--muted-1); cursor: pointer;
    font-family: var(--font-mono); font-size: 26px; font-weight: 300;
    transition: color var(--dur-normal) ease, text-shadow var(--dur-normal) ease;
  }
  .arrow:hover { color: var(--accent-red); text-shadow: var(--glow-red-sm); }
  /* thumbnail carousel + counter */
  .rail { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .thumbs { display: flex; gap: var(--space-2); max-width: min(88vw, 1120px); overflow-x: auto; padding: 2px; }
  .thumb {
    width: 64px; height: 42px; flex: none; overflow: hidden; cursor: pointer;
    opacity: 0.45; filter: grayscale(0.3);
    transition: opacity var(--dur-normal) ease, filter var(--dur-normal) ease, box-shadow var(--dur-normal) ease;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb:hover { opacity: 0.75; }
  .thumb.on { opacity: 1; filter: none; box-shadow: 0 0 0 1px var(--accent-red); }
  .counter { font-size: 11px; color: var(--muted-1); letter-spacing: 0.08em; }
  .note { text-align: center; font-size: 10px; color: var(--muted-3); padding-bottom: var(--space-5); }
</style>
</head>
<body>
  <div class="bar">
    <a class="back" href="index.html">‹ back</a>
    <span class="eyebrow">04 · photography</span>
    <span style="width:60px"></span>
  </div>

  <div id="root" class="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // GALLERY PHOTOS — drop your image files in  ui_kits/portfolio/photos/
    // named 01.jpg, 02.jpg, 03.jpg, 04.jpg  (add more entries for more photos).
    // Edit `cap`/`meta` to your own captions. If a file is missing, the frame
    // shows the crimson placeholder instead.
    const FRAMES = [
      { id: '001', src: 'photos/01.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 85% at 42% 38%, rgba(255,36,80,0.42), transparent 68%), radial-gradient(22% 24% at 82% 76%, rgba(63,217,224,0.3), transparent 70%), #050609' },
      { id: '002', src: 'photos/02.jpg', meta: '16mm · f/8', cap: 'montréal, blue hour', tone: 'radial-gradient(65% 80% at 55% 45%, rgba(255,36,80,0.32), transparent 70%), radial-gradient(18% 20% at 20% 30%, rgba(63,217,224,0.28), transparent 70%), #050609' },
      { id: '003', src: 'photos/03.jpg', meta: '27mm · f/8', cap: 'montréal', pos: 'center bottom', tone: 'radial-gradient(70% 90% at 48% 30%, rgba(255,36,80,0.38), transparent 66%), radial-gradient(24% 26% at 78% 82%, rgba(63,217,224,0.22), transparent 70%), #050609' },
      { id: '004', src: 'photos/04.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
      { id: '005', src: 'photos/05.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
    {id: '006', src: 'photos/06.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
    {id: '007', src: 'photos/07.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
    {id: '008', src: 'photos/08.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
    {id: '009', src: 'photos/09.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
   {id: '010', src: 'photos/10.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' }, 
  {id : '011', src: 'photos/11.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
  {id : '012', src: 'photos/12.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
  {id : '013', src: 'photos/13.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' },
  {id : '014', src: 'photos/14.jpg', meta: '27mm · f/8', cap: 'montréal', tone: 'radial-gradient(60% 80% at 40% 42%, rgba(255,36,80,0.45), transparent 68%), radial-gradient(26% 30% at 84% 70%, rgba(63,217,224,0.32), transparent 70%), #050609' }, 
  ];


    function Gallery() {
      const [i, setI] = useState(0);

      const go = useCallback((d) => setI((p) => (p + d + FRAMES.length) % FRAMES.length), []);
      useEffect(() => {
        const h = (e) => { if (e.key === 'ArrowLeft') go(-1); if (e.key === 'ArrowRight') go(1); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [go]);

      const f = FRAMES[i];
      return (
        <React.Fragment>
          <button className="arrow" aria-label="previous" onClick={() => go(-1)}>‹</button>
          <div className="frame-wrap">
            <div className="frame">
              <div className="img" key={f.id} style={{ background: f.tone }}>
                {f.src && (
                  <img src={f.src} alt={f.cap}
                    style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: f.pos || 'center', display: 'block' }}
                    onError={(e) => { e.currentTarget.style.display = 'none'; }} />
                )}
              </div>
              <div className="meta-br">{f.meta}</div>
            </div>
            <div className="caption">{f.cap}</div>
            <div className="rail">
              <div className="thumbs">
                {FRAMES.map((fr, idx) => (
                  <div key={fr.id} className={'thumb' + (idx === i ? ' on' : '')} onClick={() => setI(idx)}>
                    <img src={fr.src} alt={fr.cap} onError={(e) => { e.currentTarget.style.display = 'none'; }} />
                  </div>
                ))}
              </div>
              <span className="counter">{String(i + 1).padStart(2, '0')} / {String(FRAMES.length).padStart(2, '0')}</span>
            </div>
          </div>
          <button className="arrow" aria-label="next" onClick={() => go(1)}>›</button>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Gallery />);
  </script>
</body>
</html>
