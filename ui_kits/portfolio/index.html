<!-- @startingPoint section="Portfolio" subtitle="Full single-page personal portfolio" viewport="720x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--texture-scan), var(--texture-dots), radial-gradient(120% 80% at 50% 0%, #16040a 0%, var(--void-0) 55%);
    color: var(--text-primary);
    min-height: 100vh;
  }
  #holo { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
  #root { position: relative; z-index: 1; max-width: var(--width-page); margin: 0 auto; padding: 0 var(--space-5); }
  .stack { display: flex; flex-direction: column; gap: var(--space-8); padding-bottom: var(--space-8); }
  #alt-holo {
    position: fixed; left: 0; top: 50%; transform: translateY(-50%);
    width: calc(50vw - (var(--width-page) / 2) + 160px); height: 100vh;
    object-fit: cover;
    z-index: 0; pointer-events: none;
    mix-blend-mode: screen; opacity: 0.85;
    filter: contrast(1.4) saturate(1.15) brightness(1.05);
    -webkit-mask-image: linear-gradient(to right, black 0%, black 30%, transparent 100%);
    mask-image: linear-gradient(to right, black 0%, black 30%, transparent 100%);
  }
  @media (max-width: 1300px) { #alt-holo { display: none; } }
</style>
</head>
<body>
  <canvas id="holo"></canvas>
  <video id="alt-holo" src="../../assets/hologram-alt.mp4" autoplay muted loop playsinline></video>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../ds-bundle.js"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="TopNav.jsx"></script>
  <script type="text/babel" src="EducationSection.jsx"></script>
  <script type="text/babel" src="ExperienceSection.jsx"></script>
  <script type="text/babel" src="ProjectsSection.jsx"></script>
  <script type="text/babel" src="InterestsSection.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div className="stack">
          <window.TopNav />
          <window.Header />
          <window.EducationSection />
          <window.ExperienceSection />
          <window.ProjectsSection />
          <window.InterestsSection />
          <window.Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <!-- Holographic cyan static: soft, grainy speckle clusters that flicker
       in place like scan noise — flanking clouds, not falling rain. -->
  <script>
  (function () {
    var c = document.getElementById('holo');
    if (!c) return;
    var ctx = c.getContext('2d');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var W, H, DPR, specks, raf;
    // Grain covers the full viewport top-to-bottom, weighted denser toward
    // the left/right edges (echoing the scan-noise clouds around the
    // hologram figure) but still present everywhere, not just in patches.
    function buildSpecks() {
      specks = [];
      var candidates = Math.round((W * H) / 800);
      var leftGutter = Math.max(0, W / 2 - 360);   // clear of the hologram video's column
      for (var i = 0; i < candidates; i++) {
        var x = Math.random() * W;
        var y = Math.random() * H;
        if (x < leftGutter) continue;
        var edge = Math.abs(x - W / 2) / (W / 2);        // 0 center → 1 at edges
        var weight = 0.12 + 0.58 * Math.pow(edge, 1.6);   // sparse everywhere, a bit denser at edges
        if (Math.random() > weight) continue;
        specks.push({
          x: x,
          y: y,
          base: 0.10 + Math.random() * 0.30,
          w: Math.random() < 0.2 ? 3 : 2,
          seed: Math.random() * Math.PI * 2,
          fspd: 0.5 + Math.random() * 1.2
        });
      }
    }
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      c.style.width = W + 'px'; c.style.height = H + 'px';
      c.width = W * DPR; c.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      buildSpecks();
    }
    function draw(now) {
      ctx.clearRect(0, 0, W, H);
      for (var i = 0; i < specks.length; i++) {
        var s = specks[i];
        var flicker = 0.55 + 0.45 * Math.abs(Math.sin(s.seed + now * 0.0004 * s.fspd));
        var jitter = 0.88 + 0.12 * Math.sin(s.seed * 1.7 + now * 0.0002);   // slow, smooth shimmer
        var a = s.base * flicker * jitter;
        if (a <= 0.012) continue;
        ctx.fillStyle = 'rgba(120,180,255,' + a + ')';
        ctx.fillRect(s.x, s.y, s.w, s.w);
      }
    }
    function frame(now) {
      draw(now);
      raf = requestAnimationFrame(frame);
    }
    function start() {
      resize();
      if (reduce) { draw(0); return; }
      raf = requestAnimationFrame(frame);
    }
    window.addEventListener('resize', function () {
      if (raf) cancelAnimationFrame(raf);
      resize();
      if (!reduce) raf = requestAnimationFrame(frame);
    });
    start();
  })();
  </script>
</body>
</html>
