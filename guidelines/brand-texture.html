<!-- @dsCard group="Brand" viewport="700x180" name="Dotted-grid texture" subtitle="The signature background — var(--texture-dots)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); }
  .demo { height:180px; background:var(--texture-dots), var(--ink-0); display:flex; align-items:center; justify-content:center; }
  .chip { font-family:var(--font-mono); font-weight:300; font-size:12px; color:var(--paper-0); border:1px solid var(--line-1); padding:8px 14px; background:var(--ink-0); }
  .chip span { color:var(--muted-2); }
</style>
</head>
<body>
  <div class="demo">
    <div class="chip">radial dots · <span>rgba(255,255,255,.15)</span> · 24px pitch</div>
  </div>
</body>
</html>
