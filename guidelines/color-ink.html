<!-- @dsCard group="Colors" viewport="700x150" name="Ink ramp" subtitle="Dark surfaces, darkest → lightest" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); font-family:var(--font-mono); font-weight:300; }
  .row { display:flex; gap:0; padding:20px; }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-sizing:border-box; border:1px solid var(--line-2); }
  .sw span { display:block; font-size:10px; color:var(--muted-1); }
  .sw b { display:block; font-size:11px; color:var(--paper-0); font-weight:400; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-0)"><b>ink-0</b><span>#000000</span></div>
    <div class="sw" style="background:var(--ink-1)"><b>ink-1</b><span>#0a0a0a</span></div>
    <div class="sw" style="background:var(--ink-2)"><b>ink-2</b><span>#141414</span></div>
    <div class="sw" style="background:var(--ink-3)"><b>ink-3</b><span>#1f1f1f</span></div>
    <div class="sw" style="background:var(--ink-4)"><b>ink-4</b><span>#2a2a2a</span></div>
  </div>
</body>
</html>
