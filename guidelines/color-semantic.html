<!-- @dsCard group="Colors" viewport="700x170" name="Lines & semantic roles" subtitle="Hairlines and the interactive link pair" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); font-family:var(--font-mono); font-weight:300; color:var(--paper-0); }
  .wrap { padding:22px; display:flex; gap:28px; align-items:flex-start; }
  .col { flex:1; }
  .lbl { font-size:10px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.18em; margin-bottom:10px; }
  .lines > div { height:1px; margin-bottom:14px; }
  .lines span { font-size:10px; color:var(--muted-1); position:relative; top:-9px; }
  a { color:var(--link-rest); text-decoration:none; transition:color 0.3s ease; font-family:var(--font-serif); font-size:15px; }
  a:hover { color:var(--link-hover); }
  .note { font-size:10px; color:var(--muted-2); margin-top:4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col lines">
      <div class="lbl">borders</div>
      <div style="background:var(--line-2)"><span>line-2 · faint</span></div>
      <div style="background:var(--line-1)"><span>line-1 · default</span></div>
      <div style="background:var(--line-3)"><span>line-3 · strong</span></div>
    </div>
    <div class="col">
      <div class="lbl">links</div>
      <a href="#">rest → white</a>
      <div class="note">hover fades to muted-2 (0.3s)</div>
    </div>
  </div>
</body>
</html>
