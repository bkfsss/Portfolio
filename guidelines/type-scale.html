<!-- @dsCard group="Type" viewport="700x300" name="Scale & roles" subtitle="Semantic roles from display to micro-label" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); color:var(--paper-0); padding:26px 28px; }
  .line { display:flex; align-items:baseline; gap:18px; padding:7px 0; border-bottom:1px solid var(--line-2); }
  .line:last-child { border-bottom:0; }
  .tok { font-family:var(--font-mono); font-size:10px; color:var(--muted-2); width:96px; flex:none; letter-spacing:0.06em; }
  .disp { font:var(--text-title); }
  .name { font:var(--text-name); }
  .body { font:var(--text-body); }
  .label { font:var(--text-label); }
  .msm { font:var(--text-mono-sm); color:var(--muted-1); }
</style>
</head>
<body>
  <div class="line"><span class="tok">--text-title</span><span class="disp">Photography &amp; code</span></div>
  <div class="line"><span class="tok">--text-name</span><span class="name">baha satgun</span></div>
  <div class="line"><span class="tok">--text-body</span><span class="body">A slim center column of serif prose.</span></div>
  <div class="line"><span class="tok">--text-label</span><span class="label">education</span></div>
  <div class="line"><span class="tok">--text-mono-sm</span><span class="msm">01 — updated jul 2026</span></div>
</body>
</html>
