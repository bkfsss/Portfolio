<!-- @dsCard group="Colors" viewport="700x150" name="Paper & muted grays" subtitle="Text values and the de-emphasis ramp" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); font-family:var(--font-mono); font-weight:300; }
  .row { display:flex; gap:0; padding:20px; }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-sizing:border-box; border:1px solid var(--line-2); }
  .sw span { display:block; font-size:10px; color:var(--muted-3); }
  .sw b { display:block; font-size:11px; color:var(--ink-0); font-weight:500; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--paper-0)"><b>paper-0</b><span>#ffffff</span></div>
    <div class="sw" style="background:var(--paper-1)"><b>paper-1</b><span>#e8e8e8</span></div>
    <div class="sw" style="background:var(--muted-1)"><b style="color:var(--ink-0)">muted-1</b><span style="color:var(--ink-1)">#a3a3a3</span></div>
    <div class="sw" style="background:var(--muted-2)"><b style="color:var(--paper-0)">muted-2</b><span style="color:var(--paper-1)">#6d6a6a</span></div>
    <div class="sw" style="background:var(--muted-3)"><b style="color:var(--paper-0)">muted-3</b><span style="color:var(--muted-1)">#4a4a4a</span></div>
  </div>
</body>
</html>
