<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px rhythm — includes the 24px dot pitch" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); color:var(--paper-0); padding:24px; font-family:var(--font-mono); font-weight:300; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .item { text-align:center; }
  .bar { background:var(--paper-0); width:100%; }
  .item span { display:block; font-size:9px; color:var(--muted-1); margin-top:8px; }
  .item b { display:block; font-size:10px; color:var(--muted-2); font-weight:400; }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:24px"><div class="bar" style="height:4px"></div><b>1</b><span>4</span></div>
    <div class="item" style="width:28px"><div class="bar" style="height:8px"></div><b>2</b><span>8</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:12px"></div><b>3</b><span>12</span></div>
    <div class="item" style="width:36px"><div class="bar" style="height:16px"></div><b>4</b><span>16</span></div>
    <div class="item" style="width:44px"><div class="bar" style="height:24px"></div><b>5</b><span>24</span></div>
    <div class="item" style="width:52px"><div class="bar" style="height:32px"></div><b>6</b><span>32</span></div>
    <div class="item" style="width:64px"><div class="bar" style="height:48px"></div><b>7</b><span>48</span></div>
    <div class="item" style="width:80px"><div class="bar" style="height:64px"></div><b>8</b><span>64</span></div>
  </div>
</body>
</html>
