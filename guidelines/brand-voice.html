<!-- @dsCard group="Brand" viewport="700x210" name="Voice" subtitle="Lowercase mono labels, sentence-case serif content" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); color:var(--paper-0); padding:26px 30px; }
  .lbl { font-family:var(--font-mono); font-weight:300; font-size:14px; color:var(--paper-0); }
  .content { font-family:var(--font-serif); font-size:15px; color:var(--paper-1); margin:4px 0 20px; }
  .rule { font-family:var(--font-mono); font-size:11px; color:var(--muted-2); border-top:1px solid var(--line-2); padding-top:12px; }
  em { color:var(--muted-1); font-style:normal; }
</style>
</head>
<body>
  <div class="lbl">experience</div>
  <div class="content">Built things, broke things, shipped a few. Currently studying between commits.</div>
  <div class="rule">labels: <em>lowercase mono</em> &nbsp;·&nbsp; content: <em>sentence-case serif</em> &nbsp;·&nbsp; no emoji, no exclamation</div>
</body>
</html>
