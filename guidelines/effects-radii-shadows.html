<!-- @dsCard group="Spacing" viewport="700x210" name="Radii & shadows" subtitle="Sharp by default; subtle elevation on black" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); color:var(--paper-0); padding:26px; }
  .grid { display:flex; gap:22px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:80px; height:64px; background:var(--ink-2); border:1px solid var(--line-1); }
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--muted-1); font-weight:300; }
  .sep { width:1px; background:var(--line-2); align-self:stretch; margin:0 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--radius-0)"></div><div class="lbl">radius-0</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2)"></div><div class="lbl">radius-2</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-3)"></div><div class="lbl">radius-3</div></div>
    <div class="sep"></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-1)"></div><div class="lbl">shadow-1</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-2)"></div><div class="lbl">shadow-2</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-3)"></div><div class="lbl">shadow-3</div></div>
  </div>
</body>
</html>
