<!-- @dsCard group="Colors" viewport="700x150" name="Accents — figure red & cyan glint" subtitle="Crimson primary, cyan secondary, near-black void" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--void-0); font-family:var(--font-mono); font-weight:300; }
  .row { display:flex; gap:0; padding:20px; }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-sizing:border-box; border:1px solid var(--line-2); }
  .sw span { display:block; font-size:10px; }
  .sw b { display:block; font-size:11px; font-weight:400; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--accent-red); box-shadow:var(--glow-red-md)"><b style="color:var(--paper-0)">accent-red</b><span style="color:var(--accent-red-ink)">#ff2450</span></div>
    <div class="sw" style="background:var(--accent-red-2)"><b style="color:var(--paper-0)">accent-red-2</b><span style="color:var(--paper-1)">#c8163c</span></div>
    <div class="sw" style="background:var(--accent-cyan)"><b style="color:var(--void-0)">accent-cyan</b><span style="color:var(--accent-cyan-ink)">#3fd9e0</span></div>
    <div class="sw" style="background:var(--accent-cyan-2)"><b style="color:var(--void-0)">accent-cyan-2</b><span style="color:var(--void-1)">#1f8b93</span></div>
    <div class="sw" style="background:var(--void-0)"><b style="color:var(--accent-red)">void-0</b><span style="color:var(--muted-1)">#050609</span></div>
  </div>
</body>
</html>
