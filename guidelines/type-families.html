<!-- @dsCard group="Type" viewport="700x200" name="Families" subtitle="JetBrains Mono for UI, Times New Roman for content" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-0); color:var(--paper-0); padding:26px; }
  .grid { display:flex; gap:40px; }
  .col { flex:1; }
  .tag { font-family:var(--font-mono); font-size:10px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.18em; margin-bottom:12px; }
  .mono { font-family:var(--font-mono); }
  .serif { font-family:var(--font-serif); }
  .big { font-size:34px; font-weight:300; line-height:1.1; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--muted-1); margin-top:12px; font-weight:300; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <div class="tag">mono · ui + labels</div>
      <div class="mono big">Aa Gg 01</div>
      <div class="meta">JetBrains Mono · 300 / 400 / 500 / 700</div>
    </div>
    <div class="col">
      <div class="tag">serif · content</div>
      <div class="serif big">Aa Gg 01</div>
      <div class="meta">Times New Roman · system</div>
    </div>
  </div>
</body>
</html>
